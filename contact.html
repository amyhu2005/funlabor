<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact // Logic Transmission // Amy Hu</title>
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .contact-container {
            padding: 10vh 5vw;
            max-width: 1200px;
            margin: 0 auto;
        }

        .form-box {
            background: white;
            border: 1px solid var(--border-color);
            padding: 3rem;
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.05);
            margin-top: 3rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-family: var(--mono-font);
            font-size: 0.8rem;
            color: var(--accent-orange);
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-color);
            font-family: var(--main-font);
            font-size: 1rem;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-orange);
            background: white;
        }

        .madlib-container {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .madlib-btn {
            background: #f0f0f0;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            font-family: var(--mono-font);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .madlib-btn:hover {
            background: var(--accent-orange);
            color: white;
            border-color: var(--accent-orange);
        }

        .madlib-btn.active {
            background: var(--accent-orange);
            color: white;
            border-color: var(--accent-orange);
        }

        .send-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-family: var(--mono-font);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .send-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px rgba(255, 77, 0, 0.2);
        }

        /* Inline Worksheet Styles */
        .message-worksheet {
            width: 100%;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            background: white;
            font-family: var(--main-font);
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-main);
            min-height: 250px;
            white-space: pre-wrap;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.02);
        }

        .inline-orange-input {
            display: inline-block;
            background: rgba(255, 77, 0, 0.05);
            border: 1px solid var(--accent-orange);
            color: var(--accent-orange);
            font-family: var(--mono-font);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            padding: 0px 6px;
            margin: 0 2px;
            width: auto;
            min-width: 10ch;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s ease;
            vertical-align: middle;
            line-height: 1.4;
            height: 1.4rem;
        }

        .inline-orange-input:focus {
            outline: none;
            background: rgba(255, 77, 0, 0.1);
            box-shadow: 2px 2px 0px rgba(255, 77, 0, 0.15);
        }

        .inline-orange-input::placeholder {
            color: var(--accent-orange);
            opacity: 0.6;
            font-size: 0.7rem;
        }

        .message-worksheet:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        .message-worksheet:empty::before {
            content: "INITIALIZE MANUAL TRANSMISSION OR SELECT TEMPLATE BELOW...";
            opacity: 0.3;
            font-family: var(--mono-font);
            font-size: 0.8rem;
        }

        .bezos-calc-text {
            color: var(--accent-orange);
            font-weight: 700;
            border-bottom: 2px solid var(--accent-orange);
            padding: 0 4px;
        }
    </style>
</head>

<body>
    <div class="side-id">AMY_HU // COMMS_MODULE // 2026.05.03</div>
    <div class="tech-tag orange" style="top: 20px; right: 20px;">REF_OUTBOUND_COMM</div>

    <nav class="floating-sidebar visible">
        <a href="index.html#bio" class="sidebar-item" data-label="home"><i data-lucide="home"></i></a>
        <a href="profile.html" class="sidebar-item" data-label="profile"><i data-lucide="user"></i></a>
        <a href="4am.html" class="sidebar-item" data-label="vibecoding"><i data-lucide="terminal"></i></a>
        <a href="woodshop.html" class="sidebar-item" data-label="woodworking"><i data-lucide="hammer"></i></a>
        <a href="thoughts.html" class="sidebar-item" data-label="writing"><i data-lucide="pen-tool"></i></a>
        <a href="music.html" class="sidebar-item" data-label="search history"><i data-lucide="search"></i></a>
        <a href="contact.html" class="sidebar-item" data-label="contact"><i data-lucide="message-square"></i></a>
    </nav>

    <div class="contact-container">
        <div class="blog-header">
            <p class="blog-subtitle">// DATA_TRANSMISSION // CONTACT</p>
            <h1 class="blog-page-title">Wanna make something together?</h1>
        </div>

        <div class="form-box">
            <div class="form-group">
                <label>01 // FROM_NAME</label>
                <input type="text" id="from-name" placeholder="Who are you?">
            </div>

            <div class="form-group">
                <label>02 // SUBJECT_LINE</label>
                <input type="text" id="subject" placeholder="The core objective...">
            </div>

            <div style="margin-bottom: 3rem;">
                <label
                    style="font-family: var(--mono-font); font-size: 0.8rem; color: var(--accent-orange); display: block; margin-bottom: 1rem;">SELECT
                    A PRESET_LOGIC_TEMPLATE:</label>
                <div class="madlib-container">
                    <button class="madlib-btn" data-type="roommates">THE_ROOMMATE</button>
                    <button class="madlib-btn" data-type="bezos">THE_BEZOS</button>
                    <button class="madlib-btn" data-type="mission">MISSION_IMPOSSIBLE</button>
                    <button class="madlib-btn" data-type="selfhate">THE_SELF_HATE</button>
                    <button class="madlib-btn" data-type="coolidea">THE_COOL_IDEA</button>
                    <button class="madlib-btn" data-type="employer">THE_EMPLOYER</button>
                    <button class="madlib-btn" data-type="recommendation">THE_RECC</button>
                </div>
            </div>

            <div class="form-group">
                <label>03 // MESSAGE_PAYLOAD</label>
                <div id="message-worksheet" class="message-worksheet" contenteditable="true"></div>
            </div>

            <button class="send-btn" id="send-trigger">
                <i data-lucide="send"></i> INITIALIZE_TRANSMISSION
            </button>
        </div>

        <a href="index.html" class="back-link" style="margin-top: 4rem; display: inline-block;">← RETURN_TO_BASE</a>
    </div>

    <script>
        lucide.createIcons();

        const templates = {
            roommates: {
                subject: "URGENT // DOMESTIC_PROTOCOL // CHORES",
                message: "Hey Amy, \n\nCan you [enter chores]. \n\n-[enter name]"
            },
            bezos: {
                subject: "PROPOSAL // CAP_DISTRIBUTION // $224B",
                message: "Hi Amy, \n\nI hope you are having the most fantastic day. Jeff here. I was looking to give you [enter fraction (e.g. 0.01)] of my net worth. That would be $[Calculated Amount] dollars. \n\n-Jeff"
            },
            mission: {
                subject: "CLASSIFIED // MISSION_OBJECTIVE",
                message: "Your mission if you choose to accept: [enter mission]\nThis message will self destruct in [enter duration]."
            },
            selfhate: {
                subject: "INTROSPECTION // SELF_HATE_LOG",
                message: "Hi Amy, \n\nI know you experience bouts of self hate all the time. To me, I hate my self [enter number 1-10] out of 10. I hate myself the most when [fill in the blank]. I think some amount of self hate is [blank] healthy. [enter population] should hate themselves more. I find self hate [enter number 1-10]/10 productive because [fill in the blank]. Anyhow, [enter any more general thoughts about self hate or anything else]. \n\nPeace out. \n\nBest,\n[enter name]"
            },
            coolidea: {
                subject: "INNOVATION // COOL_IDEA",
                message: "Hi Amy, \n\nCheck this out. What if [insert cool idea here]. \n\nIsn't my brain so cool. \n\nBest.\n[enter name]"
            },
            employer: {
                subject: "RE: OPPORTUNITY // [enter project]",
                message: "Hi Amy, \n\nI am currently working on [enter project]. I know you are desperate to do something cool with your time and I think this would be perfect. We are looking for someone to [enter task needed]. \n\n[any other details?]\n\nBest,\n[name]"
            },
            recommendation: {
                subject: "RECC // MEDIA_CONSUMPTION",
                message: "Hi Amy, \n\nModern Family is good but maybe it's time for you to widen your media consumption. You should totally check out this [enter media form (book, movie, etc)]. It's called [name] and it's about [description].\n\nLet me know how you like it! \n\nBest, \n[enter name]"
            }
        };

        let currentTemplateType = null;

        document.querySelectorAll('.madlib-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // UI Toggle
                document.querySelectorAll('.madlib-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const type = btn.getAttribute('data-type');
                currentTemplateType = type;
                renderWorksheet(type);

                // Update subject field
                document.getElementById('subject').value = templates[type].subject;
            });
        });

        function renderWorksheet(type) {
            const template = templates[type];
            const worksheet = document.getElementById('message-worksheet');
            worksheet.innerHTML = '';

            // Split by placeholders like [Something]
            const parts = template.message.split(/(\[.*?\])/g);

            parts.forEach(part => {
                if (part.startsWith('[') && part.endsWith(']')) {
                    const ph = part.substring(1, part.length - 1);

                    if (ph === 'Calculated Amount') {
                        const span = document.createElement('span');
                        span.id = 'bezos-calc';
                        span.className = 'bezos-calc-text';
                        span.innerText = '0';
                        worksheet.appendChild(span);
                    } else {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'inline-orange-input';
                        input.placeholder = ph;
                        input.dataset.ph = ph;

                        // Auto-size function
                        const resizeInput = () => {
                            const val = input.value || input.placeholder;
                            input.style.width = Math.max(10, val.length + 1) + 'ch';
                        };

                        // Auto-sync names
                        if (ph.toLowerCase().includes('name')) {
                            input.value = document.getElementById('from-name').value;
                        }

                        input.addEventListener('input', () => {
                            resizeInput();
                            if (ph.includes('fraction')) updateBezos(input.value);
                            if (ph.toLowerCase().includes('name')) document.getElementById('from-name').value = input.value;
                        });

                        worksheet.appendChild(input);
                        resizeInput(); // Initial size
                    }
                } else {
                    const span = document.createElement('span');
                    span.innerText = part;
                    worksheet.appendChild(span);
                }
            });
        }

        function updateBezos(fractionStr) {
            const calcSpan = document.getElementById('bezos-calc');
            if (!calcSpan) return;
            const fraction = parseFloat(fractionStr) || 0;
            const netWorth = 224000000000;
            calcSpan.innerText = (netWorth * fraction).toLocaleString();
        }

        document.getElementById('send-trigger').addEventListener('click', async () => {
            const btn = document.getElementById('send-trigger');
            const fromName = document.getElementById('from-name').value;
            const subjectInput = document.getElementById('subject');
            const worksheet = document.getElementById('message-worksheet');

            if (worksheet.innerText.trim() === "" && worksheet.querySelectorAll('input').length === 0) {
                return alert("PLEASE INITIALIZE MESSAGE PAYLOAD OR SELECT A TEMPLATE.");
            }

            // Reconstruct final message
            let finalMessage = "";
            worksheet.childNodes.forEach(node => {
                if (node.nodeName === 'INPUT') {
                    finalMessage += node.value || `[${node.dataset.ph}]`;
                } else if (node.nodeName === 'SPAN') {
                    finalMessage += node.innerText;
                } else {
                    finalMessage += node.textContent; // Handles manual typing text nodes
                }
            });

            // Reconstruct final subject
            let finalSubject = subjectInput.value;
            worksheet.querySelectorAll('input').forEach(input => {
                finalSubject = finalSubject.split(`[${input.dataset.ph}]`).join(input.value || `[${input.dataset.ph}]`);
            });

            // UI state
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin"></i> TRANSMITTING...';
            lucide.createIcons();

            try {
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_key: 'ed863a7f-826b-43f6-a0b4-0dcfaa046fa8',
                        name: fromName || "Anonymous Navigator",
                        subject: finalSubject,
                        message: finalMessage,
                        from_name: "Portfolio Comms Module"
                    })
                });

                const result = await response.json();
                if (result.success) {
                    btn.style.background = '#00ff00';
                    btn.style.color = '#000';
                    btn.innerHTML = '<i data-lucide="check"></i> TRANSMISSION_COMPLETE';
                    lucide.createIcons();
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                } else { throw new Error(); }
            } catch (error) {
                btn.style.background = '#ff0000';
                btn.innerHTML = '<i data-lucide="alert-triangle"></i> TRANSMISSION_FAILED';
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>

    <style>
        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
